  - date: '2026-06-03'
    rating: 3
    summary: >-
      SJTU operates a genuine official developer platform at developer.sjtu.edu.cn
      (HTTP 200) documenting jAccount OAuth 2.0 / OpenID Connect SSO and a GraphQL
      data resources platform (graphql.sjtu.edu.cn) spanning account, faculty,
      undergraduate teaching, and paper data. The OIDC documentation and GraphQL
      docs pages are publicly readable and verified live. The data APIs themselves
      are gated behind an application/approval process, and the GraphQL endpoint and
      jAccount OAuth endpoints require credentials, so they were not exercised. The
      api.sjtu.edu.cn host did not resolve directly during probing. Much of the
      documentation is in Chinese. No fabrication: only endpoints and docs confirmed
      live are listed; no SignUp/free-tier was advertised publicly. No single official
      university-wide GitHub org exists; sjtug (SJTU *nix User Group) is the most
      established verified community org.
